version: '3.8'

services:
  db:
    image: postgres:16.4
    env_file:
      - ./backend/.env.production  # Load environment variables from the .env.production file
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "sellinios", "-d", "aethradb"]
      interval: 30s
      timeout: 10s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: /bin/sh ./entrypoint.sh
    volumes:
      - ./backend:/code
      - static_volume:/code/static
      - media_volume:/code/media
    env_file:
      - ./backend/.env.production  # Load environment variables from the .env.production file
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/"]
      interval: 30s
      timeout: 10s
      retries: 3
    expose:
      - '8000'

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      - REACT_APP_API_URL=https://kairos.gr/api/
    depends_on:
      - backend
    volumes:
      - ./frontend/build:/usr/share/nginx/html
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  nginx:
    image: nginx:stable-alpine
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - static_volume:/code/static:ro
      - media_volume:/code/media:ro
      - ./frontend/build:/usr/share/nginx/html:ro
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy

volumes:
  postgres_data:
  static_volume:
  media_volume:
